<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 角丸の青背景 -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="#378ADD"/>

  <!-- 車のシルエット（白、シンプルなSUV風） -->
  <g fill="#fff">
    <!-- 車体（横長の角丸長方形＋上部の山型） -->
    <path d="
      M 11 32
      Q 11 26 16 26
      L 21 26
      L 24 19
      Q 25 17 28 17
      L 36 17
      Q 39 17 40 19
      L 43 26
      L 48 26
      Q 53 26 53 32
      L 53 38
      L 11 38
      Z
    "/>
    <!-- 窓部分（青で抜く） -->
    <path d="
      M 25 25
      L 27 21
      Q 27.5 20 28.5 20
      L 35.5 20
      Q 36.5 20 37 21
      L 39 25
      Z
    " fill="#378ADD"/>
    <!-- タイヤ（黒っぽい円） -->
    <circle cx="19" cy="40" r="5" fill="#1a1d27"/>
    <circle cx="45" cy="40" r="5" fill="#1a1d27"/>
    <!-- ホイール（白） -->
    <circle cx="19" cy="40" r="2" fill="#fff"/>
    <circle cx="45" cy="40" r="2" fill="#fff"/>
  </g>

  <!-- 右下に光る緑の矢印（進行・流れ） -->
  <g fill="#1db97a" stroke="#0f1117" stroke-width="0.5">
    <path d="
      M 36 50
      L 50 50
      L 50 47
      L 56 51.5
      L 50 56
      L 50 53
      L 36 53
      Z
    "/>
  </g>
</svg>
